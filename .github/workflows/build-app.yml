name: Build app

# Builds Everseq.app and uploads it as an artifact; a version tag (v*) also
# attaches it to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Build Everseq.app (release)
        run: ./scripts/build-app.sh release

      - name: Zip the bundle
        run: ditto -c -k --keepParent build/Everseq.app Everseq.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: Everseq.app.zip
          archive: false     # upload as-is, so the download isn't a zip-in-a-zip

      - name: Attach to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" Everseq.app.zip \
            --title "$GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" Everseq.app.zip --clobber
