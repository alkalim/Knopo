name: Build app

# Builds Everseq.app and uploads it as an artifact; a version tag (v*) also
# attaches it to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Build Everseq.app (release)
        # On a tag (v0.2.0 → 0.2.0) the version comes from the tag; otherwise "dev".
        # The build number is the CI run number (monotonic).
        run: |
          if [ "$GITHUB_REF_TYPE" = tag ]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="dev"; fi
          # Name the download by version, OS, and CPU — e.g. Everseq-0.1.2-macos-arm64.zip.
          echo "ZIP=Everseq-${VERSION}-macos-$(uname -m).zip" >> "$GITHUB_ENV"
          VERSION="$VERSION" BUILD="$GITHUB_RUN_NUMBER" ./scripts/build-app.sh release

      - name: Zip the bundle
        run: ditto -c -k --keepParent build/Everseq.app "$ZIP"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ env.ZIP }}
          archive: false     # upload as-is, so the download isn't a zip-in-a-zip

      - name: Attach to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Release notes come from this tag's section in CHANGELOG.md.
          awk -v tag="$GITHUB_REF_NAME" '
            $0 ~ "^## " tag "( |$)" { flag=1; next }
            flag && /^## / { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          # Append the same Gatekeeper note to every release: the build is
          # unsigned/un-notarized, so macOS quarantines it and users must clear
          # the flag before it will open.
          cat >> release-notes.md <<'EOF'

          ---

          ### Opening Everseq the first time

          Everseq isn't code-signed or notarized yet, so macOS quarantines the download and refuses to open it. After unzipping and moving `Everseq.app` into Applications, open the Terminal (Applications ▸ Utilities ▸ Terminal) and run this command to clear the quarantine flag:

          ```sh
          xattr -dr com.apple.quarantine /Applications/Everseq.app
          ```

          Then open the app normally. (Adjust the path if you keep the app elsewhere.)
          EOF
          gh release create "$GITHUB_REF_NAME" "$ZIP" \
            --title "$GITHUB_REF_NAME" --notes-file release-notes.md \
          || gh release upload "$GITHUB_REF_NAME" "$ZIP" --clobber
